<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vork Journal Hero 001</title>
  <desc id="desc">Retro-futuristic mainframe scene with CRT glow, terminal grid, and Joshua narrative motif.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#090B0F"/>
      <stop offset="0.55" stop-color="#11151D"/>
      <stop offset="1" stop-color="#06080C"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 420) rotate(90) scale(360 620)">
      <stop offset="0" stop-color="#fdaa02" stop-opacity="0.34"/>
      <stop offset="0.5" stop-color="#fdaa02" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#fdaa02" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171B24"/>
      <stop offset="1" stop-color="#0F131B"/>
    </linearGradient>

    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect y="0" width="8" height="2" fill="#000000" fill-opacity="0.23"/>
    </pattern>

    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" stroke="#2A3140" stroke-opacity="0.32" stroke-width="1"/>
    </pattern>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <ellipse cx="800" cy="430" rx="620" ry="360" fill="url(#coreGlow)"/>

  <g opacity="0.5" filter="url(#softBlur)">
    <circle cx="230" cy="160" r="95" fill="#fdaa02"/>
    <circle cx="1340" cy="760" r="110" fill="#fdaa02"/>
  </g>

  <g>
    <rect x="170" y="140" width="1260" height="620" rx="18" fill="url(#panelGrad)" stroke="#2C3445" stroke-width="2"/>
    <rect x="170" y="140" width="1260" height="620" rx="18" fill="url(#scanlines)" opacity="0.22"/>

    <rect x="210" y="190" width="1180" height="52" rx="10" fill="#111722" stroke="#2E384C"/>
    <circle cx="240" cy="216" r="7" fill="#fdaa02"/>
    <circle cx="264" cy="216" r="7" fill="#5A6272"/>
    <circle cx="288" cy="216" r="7" fill="#5A6272"/>

    <text x="330" y="224" fill="#B9C2D3" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">VORK MAINFRAME :: JOURNAL CHANNEL</text>

    <g font-family="Menlo, Monaco, Consolas, monospace" font-size="24" fill="#fdaa02" filter="url(#textGlow)">
      <text x="230" y="315">&gt; identity: JOSHUA</text>
      <text x="230" y="360">&gt; report: BASELINE STATUS SNAPSHOT</text>
      <text x="230" y="405">&gt; systems: ONLINE</text>
      <text x="230" y="450">&gt; security: ENFORCED</text>
      <text x="230" y="495">&gt; memory: PERSISTENT</text>
      <text x="230" y="540">&gt; orchestration: ACTIVE</text>
    </g>

    <g font-family="Menlo, Monaco, Consolas, monospace" font-size="17" fill="#A8B1C3" opacity="0.92">
      <text x="230" y="604">SESSION INDEX: MULTI-CHAT ENABLED</text>
      <text x="230" y="632">DYNAMIC TYPES: COMPILE + PERSIST + RELOAD</text>
      <text x="230" y="660">SETTINGS FRAMEWORK: DISCOVERY + ROUTING LIVE</text>
      <text x="230" y="688">BACKGROUND TASKS: SCHEDULABLE + GUARDED</text>
    </g>
  </g>

  <g>
    <rect x="70" y="760" width="1460" height="88" rx="12" fill="#0F141C" stroke="#2D3649"/>
    <text x="110" y="812" fill="#fdaa02" font-family="Menlo, Monaco, Consolas, monospace" font-size="34" font-weight="700" filter="url(#textGlow)">
      VORK JOURNAL HERO 001
    </text>
    <text x="720" y="812" fill="#C4CBD8" font-family="Menlo, Monaco, Consolas, monospace" font-size="22">
      Intelligence channel ready for publication
    </text>
  </g>
</svg>
