<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Input — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/packages/npm/bootstrap/current/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/bootstrap-theme.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/pending-sessions.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-4" style="max-width: 860px;">

    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="/index.html" class="btn btn-outline-secondary btn-sm" title="Back to Chat">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="mb-0">
                <i class="fa-solid fa-inbox me-2 text-warning"></i>Pending Input
            </h2>
            <p class="text-muted small mb-0">Sessions waiting for your response</p>
        </div>
    </div>

    <!-- Loading state -->
    <div id="loading-state" class="text-center py-5">
        <div class="spinner-border text-secondary" role="status">
            <span class="visually-hidden">Loading…</span>
        </div>
        <div class="text-muted mt-2 small">Checking for pending sessions…</div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="d-none text-center py-5">
        <i class="fa-solid fa-circle-check fa-3x text-success mb-3 d-block"></i>
        <h5 class="text-muted">All clear</h5>
        <p class="text-muted small">No sessions are waiting for your input.</p>
        <a href="/index.html" class="btn btn-outline-secondary btn-sm mt-2">
            <i class="fa-solid fa-comments me-1"></i>Back to Chat
        </a>
    </div>

    <!-- Session cards rendered by JS -->
    <div id="sessions-container"></div>

</div>

<script src="/packages/npm/bootstrap/current/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/pending-sessions.js"></script>
</body>
</html>
