<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/bootstrap-theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .badge-MANUAL        { background: #6c757d; }
        .badge-ONE_TIME      { background: #0d6efd; }
        .badge-REPEAT        { background: #198754; }
        .badge-WAITING       { background: #0dcaf0; color: #000; }
        .badge-ACTIVE        { background: #198754; }
        .badge-AWAITING_INPUT{ background: #fd7e14; }
        .badge-PAUSED        { background: #ffc107; color: #000; }
        .truncate { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-4" style="max-width: 960px;">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-3">
            <a href="/index.html" class="btn btn-outline-secondary btn-sm" title="Back to Chat">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h2 class="mb-0"><i class="fa-solid fa-clock-rotate-left me-2"></i>Jobs</h2>
                <p class="text-muted small mb-0">Scheduled and manual AI background tasks</p>
            </div>
        </div>
        <button class="btn btn-primary" onclick="openCreate()">
            <i class="fa-solid fa-plus me-2"></i>New Job
        </button>
    </div>

    <div id="alert-area" class="mb-3"></div>

    <!-- Jobs table -->
    <div class="card">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(jobs)}" class="text-center text-muted py-5">
                <i class="fa-solid fa-clock fa-2x mb-3 d-block"></i>
                No jobs yet. Click <strong>New Job</strong> to create one.
            </div>
            <table th:unless="${#lists.isEmpty(jobs)}" class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Schedule</th>
                        <th>Agent / Model</th>
                        <th>Status</th>
                        <th>Last Run</th>
                        <th>Next Run</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="job : ${jobs}" th:id="'row-' + ${job.id()}">
                        <td>
                            <div class="fw-semibold" th:text="${job.name()}"></div>
                            <div class="text-muted small truncate" th:text="${job.aiPrompt()}"></div>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="'badge-' + ${job.invocationType()}"
                                  th:text="${job.invocationType()}"></span>
                        </td>
                        <td class="small text-muted">
                            <span th:if="${job.invocationType().name() == 'MANUAL'}">—</span>
                            <span th:if="${job.invocationType().name() == 'ONE_TIME'}"
                                  th:text="${#temporals.format(job.startTime(), 'dd MMM yyyy HH:mm')}"></span>
                            <span th:if="${job.invocationType().name() == 'REPEAT'}">
                                Every <span th:text="${job.repeatDuration()}"></span>
                                <span th:text="${job.durationType().name().toLowerCase()}"></span>
                            </span>
                        </td>
                        <td class="small text-muted">
                            <div th:if="${job.agentTemplateId() != null}" th:text="'Agent: ' + ${job.agentTemplateId()}"></div>
                            <div th:if="${job.provider() != null}" th:text="${job.provider()} + ' / ' + ${job.modelId() != null ? job.modelId() : '—'}"></div>
                            <span th:if="${job.agentTemplateId() == null and job.provider() == null}">—</span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="'badge-' + ${job.status()}"
                                  th:text="${job.status()}"></span>
                        </td>
                        <td class="small text-muted">
                            <span th:if="${job.lastExecutionTime() == 0}">Never</span>
                            <span th:unless="${job.lastExecutionTime() == 0}"
                                  th:text="${#temporals.format(#temporals.createFromEpochMilli(job.lastExecutionTime()), 'dd MMM yyyy HH:mm')}"></span>
                        </td>
                        <td class="small text-muted">
                            <span th:if="${job.invocationType().name() == 'MANUAL' or job.nextExecutionTime() == 0}">—</span>
                            <span th:unless="${job.invocationType().name() == 'MANUAL' or job.nextExecutionTime() == 0}"
                                  th:text="${#temporals.format(#temporals.createFromEpochMilli(job.nextExecutionTime()), 'dd MMM yyyy HH:mm')}"></span>
                        </td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end flex-wrap">
                                <!-- Run Now — all jobs -->
                                <button class="btn btn-sm btn-outline-success"
                                        th:attr="data-id=${job.id()}"
                                        onclick="runNow(this.dataset.id)"
                                        title="Run Now">
                                    <i class="fa-solid fa-play"></i>
                                </button>
                                <!-- Pause — ONE_TIME + REPEAT when WAITING (idle, not currently running) -->
                                <button th:if="${job.invocationType().name() != 'MANUAL' and job.status().name() == 'WAITING'}"
                                        class="btn btn-sm btn-outline-warning"
                                        th:attr="data-id=${job.id()}"
                                        onclick="pauseJob(this.dataset.id)"
                                        title="Pause">
                                    <i class="fa-solid fa-pause"></i>
                                </button>
                                <!-- Resume — ONE_TIME + REPEAT when PAUSED -->
                                <button th:if="${job.invocationType().name() != 'MANUAL' and job.status().name() == 'PAUSED'}"
                                        class="btn btn-sm btn-outline-primary"
                                        th:attr="data-id=${job.id()}"
                                        onclick="resumeJob(this.dataset.id)"
                                        title="Resume">
                                    <i class="fa-solid fa-play-circle"></i>
                                </button>
                                <!-- Authorize — when AWAITING_INPUT -->
                                <a th:if="${job.status().name() == 'AWAITING_INPUT'}"
                                   th:href="'/ui/authorize.html?sessionUuid=' + ${job.id()}"
                                   class="btn btn-sm btn-outline-warning"
                                   title="Authorize pending tool call">
                                    <i class="fa-solid fa-lock-open"></i>
                                </a>
                                <!-- Edit -->
                                <button class="btn btn-sm btn-outline-secondary"
                                        th:attr="data-id=${job.id()}"
                                        onclick="openEdit(this.dataset.id)"
                                        title="Edit">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <!-- Delete -->
                                <button class="btn btn-sm btn-outline-danger"
                                        th:attr="data-id=${job.id()}"
                                        onclick="deleteJob(this.dataset.id)"
                                        title="Delete">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ─── Create / Edit Modal ──────────────────────────────────────────────── -->
<div class="modal fade" id="jobModal" tabindex="-1" aria-labelledby="jobModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="jobModalLabel">New Job</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="job-id">

                <div class="row g-3">
                    <!-- Name -->
                    <div class="col-12">
                        <label class="form-label" for="job-name">Name <span class="text-danger">*</span></label>
                        <input type="text" id="job-name" class="form-control" placeholder="e.g. Daily report">
                    </div>

                    <!-- Prompt -->
                    <div class="col-12">
                        <label class="form-label" for="job-prompt">AI Prompt <span class="text-danger">*</span></label>
                        <textarea id="job-prompt" class="form-control" rows="3"
                                  placeholder="The task to run, e.g. Summarise new emails and post to Slack"></textarea>
                    </div>

                    <!-- Invocation type -->
                    <div class="col-12">
                        <label class="form-label">Invocation Type <span class="text-danger">*</span></label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="invocationType"
                                       id="type-MANUAL" value="MANUAL" onchange="onTypeChange()">
                                <label class="form-check-label" for="type-MANUAL">
                                    <strong>Manual</strong> — triggered by Run Now only
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="invocationType"
                                       id="type-ONE_TIME" value="ONE_TIME" onchange="onTypeChange()">
                                <label class="form-check-label" for="type-ONE_TIME">
                                    <strong>One-time</strong> — runs once at a scheduled time
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="invocationType"
                                       id="type-REPEAT" value="REPEAT" onchange="onTypeChange()">
                                <label class="form-check-label" for="type-REPEAT">
                                    <strong>Repeat</strong> — runs on a fixed interval
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Start time (ONE_TIME + REPEAT) -->
                    <div class="col-md-6" id="row-start-time" style="display:none;">
                        <label class="form-label" for="job-start-time">Start Time</label>
                        <input type="datetime-local" id="job-start-time" class="form-control">
                    </div>

                    <!-- Repeat duration (REPEAT only) -->
                    <div class="col-md-3" id="row-repeat-duration" style="display:none;">
                        <label class="form-label" for="job-repeat-duration">Every</label>
                        <input type="number" id="job-repeat-duration" class="form-control" min="1" value="1">
                    </div>
                    <div class="col-md-3" id="row-duration-type" style="display:none;">
                        <label class="form-label" for="job-duration-type">&nbsp;</label>
                        <select id="job-duration-type" class="form-select">
                            <option value="MINUTES">Minutes</option>
                            <option value="HOURS" selected>Hours</option>
                            <option value="DAYS">Days</option>
                            <option value="WEEKS">Weeks</option>
                            <option value="MONTHS">Months</option>
                        </select>
                    </div>

                    <!-- Agent -->
                    <div class="col-md-6">
                        <label class="form-label" for="job-agent">Agent Template</label>
                        <select id="job-agent" class="form-select">
                            <option value="">— none (use default) —</option>
                        </select>
                    </div>

                    <!-- Provider / Model -->
                    <div class="col-md-6">
                        <label class="form-label" for="job-model">Provider &amp; Model</label>
                        <select id="job-model" class="form-select">
                            <option value="">— none (use global default) —</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="btn-save-job" class="btn btn-primary" onclick="saveJob()">
                    <i class="fa-solid fa-save me-1"></i>Save Job
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let jobModal;
    let allJobs = [];

    // ── Initialise ────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
        jobModal = new bootstrap.Modal(document.getElementById('jobModal'));
        loadAgents();
        loadModels();
        // Hydrate allJobs from server-rendered data for the edit flow
        loadJobsJson();
    });

    function loadAgents() {
        fetch('/api/chat/agents')
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (agents) {
                var sel = document.getElementById('job-agent');
                agents.forEach(function (a) {
                    var opt = document.createElement('option');
                    opt.value = a.uuid;
                    opt.textContent = a.name;
                    sel.appendChild(opt);
                });
            })
            .catch(function () {});
    }

    function loadModels() {
        fetch('/api/chat/models')
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (groups) {
                var sel = document.getElementById('job-model');
                groups.forEach(function (g) {
                    if (!g.configured) return;
                    g.models.forEach(function (m) {
                        var opt = document.createElement('option');
                        opt.value = g.providerKey + ':' + m.modelId;
                        opt.textContent = g.providerLabel + ' — ' + m.label;
                        sel.appendChild(opt);
                    });
                });
            })
            .catch(function () {});
    }

    function loadJobsJson() {
        fetch('/api/jobs')
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (jobs) { allJobs = jobs; })
            .catch(function () {});
    }

    // ── Modal helpers ─────────────────────────────────────────────────────────
    function openCreate() {
        document.getElementById('jobModalLabel').textContent = 'New Job';
        document.getElementById('job-id').value = '';
        document.getElementById('job-name').value = '';
        document.getElementById('job-prompt').value = '';
        document.getElementById('job-start-time').value = '';
        document.getElementById('job-repeat-duration').value = 1;
        document.getElementById('job-duration-type').value = 'HOURS';
        document.getElementById('job-agent').value = '';
        document.getElementById('job-model').value = '';
        document.querySelectorAll('input[name="invocationType"]').forEach(function (r) { r.checked = false; });
        onTypeChange();
        jobModal.show();
    }

    function openEdit(id) {
        var job = allJobs.find(function (j) { return j.id === id; });
        if (!job) { showAlert('Job not found.', 'warning'); return; }

        document.getElementById('jobModalLabel').textContent = 'Edit Job';
        document.getElementById('job-id').value = job.id;
        document.getElementById('job-name').value = job.name;
        document.getElementById('job-prompt').value = job.aiPrompt;
        document.getElementById('job-agent').value = job.agentTemplateId || '';

        var modelKey = job.provider ? job.provider + ':' + (job.modelId || '') : '';
        document.getElementById('job-model').value = modelKey;

        var typeRadio = document.getElementById('type-' + job.invocationType);
        if (typeRadio) typeRadio.checked = true;
        onTypeChange();

        if (job.startTime) {
            var dt = new Date(job.startTime);
            document.getElementById('job-start-time').value = toDatetimeLocal(dt);
        }
        document.getElementById('job-repeat-duration').value = job.repeatDuration || 1;
        document.getElementById('job-duration-type').value = job.durationType || 'HOURS';

        jobModal.show();
    }

    function onTypeChange() {
        var type = selectedType();
        var showStart   = type === 'ONE_TIME' || type === 'REPEAT';
        var showRepeat  = type === 'REPEAT';
        document.getElementById('row-start-time').style.display      = showStart  ? '' : 'none';
        document.getElementById('row-repeat-duration').style.display = showRepeat ? '' : 'none';
        document.getElementById('row-duration-type').style.display   = showRepeat ? '' : 'none';
    }

    function selectedType() {
        var radio = document.querySelector('input[name="invocationType"]:checked');
        return radio ? radio.value : null;
    }

    // ── CRUD ──────────────────────────────────────────────────────────────────
    async function saveJob() {
        var id   = document.getElementById('job-id').value;
        var type = selectedType();
        if (!type) { showAlert('Please select an invocation type.', 'warning'); return; }

        var modelVal = document.getElementById('job-model').value;
        var sep      = modelVal ? modelVal.indexOf(':') : -1;
        var provider = sep >= 0 ? modelVal.substring(0, sep) : null;
        var modelId  = sep >= 0 ? modelVal.substring(sep + 1) : null;

        var body = {
            name:             document.getElementById('job-name').value.trim(),
            aiPrompt:         document.getElementById('job-prompt').value.trim(),
            invocationType:   type,
            startTime:        document.getElementById('job-start-time').value || null,
            repeatDuration:   parseInt(document.getElementById('job-repeat-duration').value) || 0,
            durationType:     document.getElementById('job-duration-type').value,
            agentTemplateId:  document.getElementById('job-agent').value || null,
            provider:         provider,
            modelId:          modelId
        };

        var btn = document.getElementById('btn-save-job');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving…';

        try {
            var url    = id ? '/api/jobs/' + id : '/api/jobs';
            var method = id ? 'PUT' : 'POST';
            var res    = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            var data = await res.json();
            if (data.error) { showAlert(data.error, 'danger'); return; }
            jobModal.hide();
            showAlert((id ? 'Job updated.' : 'Job created.'), 'success');
            setTimeout(function () { location.reload(); }, 800);
        } catch (e) {
            showAlert('Network error saving job.', 'danger');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-save me-1"></i>Save Job';
        }
    }

    async function deleteJob(id) {
        if (!confirm('Delete this job? This cannot be undone.')) return;
        try {
            var res  = await fetch('/api/jobs/' + id, { method: 'DELETE' });
            var data = await res.json();
            if (data.error) { showAlert(data.error, 'danger'); return; }
            showAlert('Job deleted.', 'warning');
            setTimeout(function () { location.reload(); }, 600);
        } catch (e) {
            showAlert('Network error deleting job.', 'danger');
        }
    }

    async function runNow(id) {
        try {
            var res  = await fetch('/api/jobs/' + id + '/run', { method: 'POST' });
            var data = await res.json();
            if (data.error) { showAlert(data.error, 'danger'); return; }
            showAlert('Job triggered. Check sessions for progress.', 'success');
        } catch (e) {
            showAlert('Network error triggering job.', 'danger');
        }
    }

    async function pauseJob(id) {
        try {
            var res  = await fetch('/api/jobs/' + id + '/pause', { method: 'POST' });
            var data = await res.json();
            if (data.error) { showAlert(data.error, 'danger'); return; }
            showAlert('Job paused.', 'warning');
            setTimeout(function () { location.reload(); }, 600);
        } catch (e) {
            showAlert('Network error pausing job.', 'danger');
        }
    }

    async function resumeJob(id) {
        try {
            var res  = await fetch('/api/jobs/' + id + '/resume', { method: 'POST' });
            var data = await res.json();
            if (data.error) { showAlert(data.error, 'danger'); return; }
            showAlert('Job resumed.', 'success');
            setTimeout(function () { location.reload(); }, 600);
        } catch (e) {
            showAlert('Network error resuming job.', 'danger');
        }
    }

    // ── Utility ───────────────────────────────────────────────────────────────
    function showAlert(msg, type) {
        var area = document.getElementById('alert-area');
        area.innerHTML = '<div class="alert alert-' + type + ' alert-dismissible fade show py-2 small" role="alert">' +
            msg + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
    }

    function toDatetimeLocal(d) {
        var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
               'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
