<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/vork.css">
</head>
<body class="bg-zinc-950 text-zinc-100">
<div class="max-w-sm mx-auto px-4 py-8">
    <div th:replace="~{fragments/settings-navigation :: backToSettings}"></div>
    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
        <i class="fa-solid fa-key text-[#fdaa02]"></i> Change Password
    </h2>
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-6">
        <form method="post" th:action="@{/settings/change-password}" th:object="${changePasswordForm}">
            <div class="mb-4">
                <label for="currentPassword" class="block text-sm font-medium text-zinc-300 mb-1.5">Current Password</label>
                <input type="password" id="currentPassword" name="currentPassword" required
                       class="w-full bg-zinc-950 border border-zinc-700 text-zinc-100 rounded-lg px-3 py-2 text-sm
                              focus:outline-none focus:border-[#fdaa02] focus:ring-2 focus:ring-[#fdaa02]/25 transition-colors">
            </div>
            <div class="mb-4">
                <label for="newPassword" class="block text-sm font-medium text-zinc-300 mb-1.5">New Password</label>
                <input type="password" id="newPassword" name="newPassword" required minlength="8"
                       class="w-full bg-zinc-950 border border-zinc-700 text-zinc-100 rounded-lg px-3 py-2 text-sm
                              focus:outline-none focus:border-[#fdaa02] focus:ring-2 focus:ring-[#fdaa02]/25 transition-colors">
            </div>
            <div class="mb-4">
                <label for="confirmPassword" class="block text-sm font-medium text-zinc-300 mb-1.5">Confirm New Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8"
                       class="w-full bg-zinc-950 border border-zinc-700 text-zinc-100 rounded-lg px-3 py-2 text-sm
                              focus:outline-none focus:border-[#fdaa02] focus:ring-2 focus:ring-[#fdaa02]/25 transition-colors">
            </div>
            <div th:if="${error}"
                 class="flex items-center gap-2 bg-red-950/50 border border-red-800/60 text-red-400 rounded-lg px-3 py-2 text-sm mb-4"
                 th:text="${error}"></div>
            <div th:if="${success}"
                 class="flex items-center gap-2 bg-green-950/50 border border-green-800/60 text-green-400 rounded-lg px-3 py-2 text-sm mb-4"
                 th:text="${success}"></div>
            <button type="submit"
                    class="w-full bg-[#fdaa02] hover:bg-[#e89a02] text-black font-semibold rounded-lg px-4 py-2.5 text-sm transition-colors">
                Change Password
            </button>
        </form>
    </div>
</div>
    <script src="/js/settings.js"></script>
</body>
</html>
