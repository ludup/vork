<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/packages/npm/bootstrap/current/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/bootstrap-theme.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>
<body>
<div class="container py-5" style="max-width: 420px;">
    <div th:replace="~{fragments/settings-navigation :: backToSettings}"></div>
    <h2 class="mb-4 text-center"><i class="fa-solid fa-key me-2"></i>Change Password</h2>
    <form method="post" th:action="@{/settings/change-password}" th:object="${changePasswordForm}">
        <div class="mb-3">
            <label for="currentPassword" class="form-label">Current Password</label>
            <input type="password" class="form-control" id="currentPassword" name="currentPassword" required>
        </div>
        <div class="mb-3">
            <label for="newPassword" class="form-label">New Password</label>
            <input type="password" class="form-control" id="newPassword" name="newPassword" required minlength="8">
        </div>
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="8">
        </div>
        <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success py-2 small" th:text="${success}"></div>
        <button type="submit" class="btn btn-primary w-100">Change Password</button>
    </form>
</div>
    <script src="/js/settings.js"></script>
</body>
</html>
