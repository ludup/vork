<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

    <div class="mb-4">
        <a href="/" title="Back to home" aria-label="Back to home"
           class="inline-flex items-center justify-center w-8 h-8 rounded border border-zinc-700 text-zinc-400 hover:text-zinc-100 hover:border-zinc-500 hover:bg-zinc-800 transition-colors no-underline">
            <i class="fa-solid fa-arrow-left text-sm"></i>
        </a>

</th:block>

<th:block th:fragment="backToSettings">
    <div class="mb-4">
        <a href="/settings" title="Back to settings" aria-label="Back to settings"
           class="inline-flex items-center justify-center w-8 h-8 rounded border border-zinc-700 text-zinc-400 hover:text-zinc-100 hover:border-zinc-500 hover:bg-zinc-800 transition-colors no-underline">
            <i class="fa-solid fa-arrow-left text-sm"></i>
        </a>
    </div>
</th:block>

</html>
