<header class="flex items-center justify-between px-4 py-2 bg-zinc-950 border-b border-zinc-800">
    <a href="/" class="flex items-center gap-2 no-underline group">
        <img src="/images/Vork-Faviconx128.png" alt="Vork" width="28" height="28">
        <span class="font-bold text-[#fdaa02] text-base tracking-tight">Vork</span>
    </a>
    <nav class="flex items-center gap-1">
        <a href="/notifications" title="My Notifications"
           class="w-8 h-8 flex items-center justify-center rounded text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-colors">
            <i class="fa-solid fa-bell text-sm"></i>
        </a>
        <a href="/agents" title="Agents"
           class="w-8 h-8 flex items-center justify-center rounded text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-colors">
            <i class="fa-solid fa-robot text-sm"></i>
        </a>
        <a href="/jobs" title="Jobs"
           class="w-8 h-8 flex items-center justify-center rounded text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-colors">
            <i class="fa-solid fa-clock-rotate-left text-sm"></i>
        </a>
        <a href="/pending-sessions" title="Pending Input"
           class="w-8 h-8 flex items-center justify-center rounded text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-colors">
            <i class="fa-solid fa-inbox text-sm"></i>
        </a>
        <a href="/data-inspector" title="Data Inspector"
           class="w-8 h-8 flex items-center justify-center rounded text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-colors">
            <i class="fa-solid fa-table-list text-sm"></i>
        </a>
        <a href="/settings" title="Settings"
           class="w-8 h-8 flex items-center justify-center rounded text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800 transition-colors">
            <i class="fa-solid fa-gear text-sm"></i>
        </a>
        <form id="logout-form" method="post" action="/logout" class="contents">
            <button type="submit" title="Logout"
                    class="w-8 h-8 flex items-center justify-center rounded text-zinc-400 hover:text-red-400 hover:bg-zinc-800 transition-colors border-0 bg-transparent cursor-pointer">
                <i class="fa-solid fa-right-from-bracket text-sm"></i>
            </button>
        </form>
    </nav>
</header>
