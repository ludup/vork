<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/vork.css">
    <style>
        @keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .login-card { animation: fadeInUp 0.3s ease-out; }

        /* CRT terminal tagline — Vork orange with scanline overlay */
        .crt-tagline {
            position: relative;
            display: inline-block;
            font-family: ui-monospace, 'Courier New', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            color: #fdaa02;
            text-shadow: 0 0 10px rgba(253,170,2,0.4);
            letter-spacing: 0.04em;
        }
        .crt-tagline::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(0,0,0,0)    0,
                rgba(0,0,0,0)    2px,
                rgba(0,0,0,0.28) 2px,
                rgba(0,0,0,0.28) 4px
            );
        }

        /* Solid block cursor */
        .terminal-cursor {
            display: inline-block;
            width: 0.55em;
            height: 1em;
            margin-left: 0.2em;
            background-color: #fdaa02;
            box-shadow: 0 0 8px rgba(253,170,2,0.6);
            vertical-align: text-bottom;
            animation: cursorFlash 1s step-end infinite;
        }
        @keyframes cursorFlash {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen bg-zinc-950 flex items-center justify-center p-4">

    <div class="login-card w-full max-w-sm">
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl shadow-2xl p-8">

            <!-- Header -->
            <div class="text-center mb-8">
                <img src="/images/Vork-Faviconx128.png" alt="Vork Logo" class="w-14 h-14 mx-auto mb-3">
                <h1 class="text-2xl font-bold text-zinc-100 tracking-tight mb-1">Vork</h1>
                <p class="text-sm"><span class="crt-tagline">&gt; AI without claws</span><span class="terminal-cursor"></span></p>
            </div>

            <form method="POST" action="/login">
                <!-- Error message -->
                <div th:if="${param.error}"
                     class="flex items-center gap-2 bg-red-950/50 border border-red-800/60 text-red-400 rounded-lg px-3 py-2.5 mb-4 text-sm">
                    <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
                    <span>Invalid username or password</span>
                </div>

                <!-- Logout message -->
                <div th:if="${param.logout}"
                     class="flex items-center gap-2 bg-teal-950/50 border border-teal-800/60 text-teal-400 rounded-lg px-3 py-2.5 mb-4 text-sm">
                    <i class="fa-solid fa-check-circle flex-shrink-0"></i>
                    <span>You have been logged out successfully</span>
                </div>

                <!-- Username -->
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-zinc-300 mb-1.5">
                        <i class="fa-solid fa-user mr-1.5 text-zinc-500"></i>Username
                    </label>
                    <input type="text" id="username" name="username" required autofocus
                           placeholder="Enter your username"
                           class="w-full bg-zinc-950 border border-zinc-700 text-zinc-100 rounded-lg px-3 py-2.5 text-sm
                                  placeholder:text-zinc-600 focus:outline-none focus:border-[#fdaa02] focus:ring-2 focus:ring-[#fdaa02]/25 transition-colors">
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="block text-sm font-medium text-zinc-300 mb-1.5">
                        <i class="fa-solid fa-lock mr-1.5 text-zinc-500"></i>Password
                    </label>
                    <input type="password" id="password" name="password" required
                           placeholder="Enter your password"
                           class="w-full bg-zinc-950 border border-zinc-700 text-zinc-100 rounded-lg px-3 py-2.5 text-sm
                                  placeholder:text-zinc-600 focus:outline-none focus:border-[#fdaa02] focus:ring-2 focus:ring-[#fdaa02]/25 transition-colors">
                </div>

                <!-- Remember me -->
                <div class="flex items-center gap-2 mb-6">
                    <input type="checkbox" id="rememberMe" name="remember-me" value="true"
                           class="w-4 h-4 rounded border-zinc-600 bg-zinc-950 accent-[#fdaa02] cursor-pointer">
                    <label for="rememberMe" class="text-sm text-zinc-400 cursor-pointer select-none">
                        Remember me for 30 days
                    </label>
                </div>

                <!-- CSRF -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- Submit -->
                <button type="submit"
                        class="w-full bg-[#fdaa02] hover:bg-[#e89a02] active:bg-[#cc8601] text-black font-semibold
                               rounded-lg px-4 py-2.5 text-sm transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#fdaa02]">
                    <i class="fa-solid fa-sign-in-alt mr-2"></i>Sign In
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-6 pt-5 border-t border-zinc-800 text-center">
                <p class="text-xs text-zinc-600">
                    <i class="fa-solid fa-shield mr-1"></i>Secure authentication required
                </p>
            </div>
        </div>
    </div>

</body>
</html>
