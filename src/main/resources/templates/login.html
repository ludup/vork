<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/packages/npm/bootstrap/current/dist/css/bootstrap.min.css">
    <!-- Custom Vork Theme -->
    <link rel="stylesheet" href="/css/bootstrap-theme.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <!-- Login stylesheet -->
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="/images/Vork-Faviconx128.png" alt="Vork Logo" class="login-logo">
                <h1>Vork</h1>
                <p class="login-tagline"><span class="crt-tagline">&gt; AI without claws</span><span class="terminal-cursor"></span></p>
            </div>

            <form method="POST" action="/login" class="login-form">
                <!-- Error message -->
                <div class="alert alert-danger alert-dismissible fade show" role="alert" 
                     th:if="${param.error}">
                    <i class="fa-solid fa-circle-exclamation me-2"></i>
                    <span>Invalid username or password</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Logout message -->
                <div class="alert alert-info alert-dismissible fade show" role="alert" 
                     th:if="${param.logout}">
                    <i class="fa-solid fa-check-circle me-2"></i>
                    <span>You have been logged out successfully</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Username field -->
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="fa-solid fa-user me-2"></i>Username
                    </label>
                    <input type="text" class="form-control form-control-lg" id="username" 
                           name="username" required autofocus 
                           placeholder="Enter your username">
                </div>

                <!-- Password field -->
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="fa-solid fa-lock me-2"></i>Password
                    </label>
                    <input type="password" class="form-control form-control-lg" id="password" 
                           name="password" required 
                           placeholder="Enter your password">
                </div>

                <!-- Remember me checkbox -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe" 
                           name="remember-me" value="true">
                    <label class="form-check-label" for="rememberMe">
                        Remember me for 30 days
                    </label>
                </div>

                <!-- CSRF token (required by Spring Security) -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- Login button -->
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                    <i class="fa-solid fa-sign-in-alt me-2"></i>Login
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p class="text-muted small">
                    <i class="fa-solid fa-shield me-1"></i>Secure authentication required
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="/packages/npm/bootstrap/current/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
