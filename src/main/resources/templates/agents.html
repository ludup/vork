<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/packages/npm/bootstrap/current/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/bootstrap-theme.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <style>
        .truncate-prompt { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-width: 320px; font-size: 0.8rem; color: #adb5bd; }
        .tool-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 0.75rem; padding: 2px 8px; border-radius: 50rem; background: #1d3557; border: 1px solid #457b9d; color: #a8dadc; white-space: nowrap; }
        .tool-pill .remove-tool { cursor: pointer; opacity: 0.7; font-size: 0.65rem; }
        .tool-pill .remove-tool:hover { opacity: 1; }
        .tool-list-item { cursor: pointer; }
        .tool-list-item:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-4" style="max-width: 1000px;">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="d-flex align-items-center gap-3">
            <a href="/index.html" class="btn btn-outline-secondary btn-sm" title="Back to Chat">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h2 class="mb-0"><i class="fa-solid fa-robot me-2"></i>Agents</h2>
                <p class="text-muted small mb-0">Manage AI agent personas and their tool permissions</p>
            </div>
        </div>
        <button class="btn btn-primary" onclick="openCreate()">
            <i class="fa-solid fa-plus me-2"></i>New Agent
        </button>
    </div>

    <div id="alert-area" class="mb-3"></div>

    <!-- Agents table -->
    <div class="card">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(agents)}" class="text-center text-muted py-5">
                <i class="fa-solid fa-robot fa-2x mb-3 d-block"></i>
                No agents found.
            </div>
            <table th:unless="${#lists.isEmpty(agents)}" class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>System Prompt</th>
                        <th>Tools</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="agent : ${agents}" th:id="'row-' + ${agent.uuid()}">
                        <td class="fw-semibold" th:text="${agent.name()}"></td>
                        <td>
                            <span th:if="${agent.systemAgent()}"
                                  class="badge bg-secondary"
                                  title="Built-in system agent">System</span>
                            <span th:unless="${agent.systemAgent()}"
                                  class="badge bg-dark border border-secondary text-secondary">User</span>
                        </td>
                        <td>
                            <div class="truncate-prompt" th:text="${agent.systemPrompt()}"></div>
                        </td>
                        <td>
                            <div th:if="${#lists.isEmpty(agent.allowedTools())}" class="text-muted small">— all tools —</div>
                            <div th:unless="${#lists.isEmpty(agent.allowedTools())}" class="d-flex flex-wrap gap-1">
                                <span th:each="t : ${agent.allowedTools()}" class="tool-pill">
                                    <i class="fa-solid fa-screwdriver-wrench"></i>
                                    <span th:text="${t}"></span>
                                </span>
                            </div>
                        </td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <button class="btn btn-sm btn-outline-secondary"
                                        th:attr="data-id=${agent.uuid()}"
                                        onclick="openEdit(this.dataset.id)"
                                        title="Edit">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger"
                                        th:attr="data-id=${agent.uuid()}"
                                        th:disabled="${agent.systemAgent()}"
                                        th:title="${agent.systemAgent() ? 'System agents cannot be deleted' : 'Delete'}"
                                        onclick="deleteAgent(this.dataset.id)">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ─── Create / Edit Modal ──────────────────────────────────────────────── -->
<div class="modal fade" id="agentModal" tabindex="-1" aria-labelledby="agentModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="agentModalLabel">New Agent</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="agent-id">

                <div class="mb-3">
                    <label class="form-label" for="agent-name">Name <span class="text-danger">*</span></label>
                    <input type="text" id="agent-name" class="form-control" placeholder="e.g. Data Analyst">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="agent-prompt">System Prompt</label>
                    <textarea id="agent-prompt" class="form-control font-monospace" rows="8"
                              placeholder="Instructions prepended to every conversation for this agent…"></textarea>
                </div>

                <!-- Allowed Tools ─────────────────────────────────────────── -->
                <div>
                    <label class="form-label">Allowed Tools
                        <span class="text-muted small">(empty = all tools available)</span>
                    </label>

                    <!-- Current tool pills -->
                    <div id="tool-pill-container" class="d-flex flex-wrap gap-1 mb-2 p-2 rounded border border-secondary" style="min-height: 40px;"></div>

                    <!-- Search + add tool -->
                    <div class="input-group mb-1">
                        <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" id="tool-search" class="form-control" placeholder="Search tools to add…" oninput="filterTools()">
                    </div>
                    <div id="tool-dropdown" class="card" style="max-height: 200px; overflow-y: auto; display: none;">
                        <ul id="tool-list" class="list-group list-group-flush"></ul>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="btn-save-agent" class="btn btn-primary" onclick="saveAgent()">
                    <i class="fa-solid fa-save me-1"></i>Save Agent
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/packages/npm/bootstrap/current/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let agentModal;
    let allAgents  = [];
    let allTools   = [];
    let modalTools = []; // tool IDs currently assigned in the open modal

    // ── Init ──────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
        agentModal = new bootstrap.Modal(document.getElementById('agentModal'));
        loadData();

        document.getElementById('agentModal').addEventListener('hidden.bs.modal', function () {
            document.getElementById('tool-search').value = '';
            document.getElementById('tool-dropdown').style.display = 'none';
        });
        document.addEventListener('click', function (e) {
            if (!e.target.closest('#tool-search') && !e.target.closest('#tool-dropdown')) {
                document.getElementById('tool-dropdown').style.display = 'none';
            }
        });
    });

    async function loadData() {
        try {
            const [agentsRes, toolsRes] = await Promise.all([
                fetch('/api/agents'),
                fetch('/api/management/tools')
            ]);
            allAgents = agentsRes.ok ? await agentsRes.json() : [];
            allTools  = toolsRes.ok  ? await toolsRes.json()  : [];
        } catch (e) {
            showAlert('Failed to load data.', 'warning');
        }
    }

    // ── Open modal ────────────────────────────────────────────────────────────
    function openCreate() {
        document.getElementById('agentModalLabel').textContent = 'New Agent';
        document.getElementById('agent-id').value      = '';
        document.getElementById('agent-name').value    = '';
        document.getElementById('agent-prompt').value  = '';
        modalTools = [];
        renderToolPills();
        agentModal.show();
    }

    function openEdit(id) {
        const agent = allAgents.find(function (a) { return a.uuid === id; });
        if (!agent) { showAlert('Agent not found — reload the page.', 'warning'); return; }

        document.getElementById('agentModalLabel').textContent = 'Edit Agent: ' + agent.name;
        document.getElementById('agent-id').value      = agent.uuid;
        document.getElementById('agent-name').value    = agent.name;
        document.getElementById('agent-prompt').value  = agent.systemPrompt || '';
        modalTools = agent.allowedTools ? agent.allowedTools.slice() : [];
        renderToolPills();
        agentModal.show();
    }

    // ── Tool pills ────────────────────────────────────────────────────────────
    function renderToolPills() {
        const container = document.getElementById('tool-pill-container');
        container.innerHTML = '';
        if (modalTools.length === 0) {
            container.innerHTML = '<span class="text-muted small">No tools assigned — agent will have access to all tools.</span>';
            return;
        }
        modalTools.forEach(function (toolId) {
            const desc = allTools.find(function (t) { return t.id === toolId; });
            const label = desc ? (desc.friendlyName || desc.name || toolId) : toolId;
            const pill = document.createElement('span');
            pill.className = 'tool-pill';
            pill.innerHTML =
                '<i class="fa-solid fa-screwdriver-wrench"></i>' +
                '<span>' + escapeHtml(label) + '</span>' +
                '<span class="remove-tool" onclick="removeTool(\'' + escapeHtml(toolId) + '\')" title="Remove tool">✕</span>';
            container.appendChild(pill);
        });
    }

    function removeTool(toolId) {
        modalTools = modalTools.filter(function (t) { return t !== toolId; });
        renderToolPills();
        filterTools(); // refresh dropdown so the removed tool reappears
    }

    // ── Tool search dropdown ──────────────────────────────────────────────────
    function filterTools() {
        const query = document.getElementById('tool-search').value.toLowerCase().trim();
        const dropdown = document.getElementById('tool-dropdown');
        const list     = document.getElementById('tool-list');

        const matches = allTools.filter(function (t) {
            if (modalTools.includes(t.id)) return false; // already added
            if (!query) return true;
            const label = ((t.friendlyName || '') + ' ' + (t.name || '') + ' ' + (t.id || '') + ' ' + (t.category || '')).toLowerCase();
            return label.includes(query);
        });

        list.innerHTML = '';
        if (matches.length === 0) {
            dropdown.style.display = 'none';
            return;
        }
        matches.forEach(function (t) {
            const li = document.createElement('li');
            li.className = 'list-group-item list-group-item-action tool-list-item py-1 px-2';
            li.innerHTML =
                '<div class="d-flex align-items-center gap-2">' +
                '  <i class="fa-solid fa-screwdriver-wrench fa-xs text-secondary"></i>' +
                '  <span class="fw-semibold small">' + escapeHtml(t.friendlyName || t.name || t.id) + '</span>' +
                (t.category ? '  <span class="badge bg-dark border border-secondary text-secondary" style="font-size:0.65rem">' + escapeHtml(t.category) + '</span>' : '') +
                '</div>' +
                (t.description ? '<div class="text-muted" style="font-size:0.7rem">' + escapeHtml(t.description) + '</div>' : '');
            li.addEventListener('click', function () {
                addTool(t.id);
                document.getElementById('tool-search').value = '';
                dropdown.style.display = 'none';
            });
            list.appendChild(li);
        });
        dropdown.style.display = '';
    }

    function addTool(toolId) {
        if (!modalTools.includes(toolId)) {
            modalTools.push(toolId);
            renderToolPills();
        }
    }

    // ── Save ──────────────────────────────────────────────────────────────────
    async function saveAgent() {
        const id   = document.getElementById('agent-id').value.trim();
        const name = document.getElementById('agent-name').value.trim();
        if (!name) { showAlert('Name is required.', 'warning'); return; }

        const body = {
            name:         name,
            systemPrompt: document.getElementById('agent-prompt').value,
            allowedTools: modalTools.slice()
        };

        const btn = document.getElementById('btn-save-agent');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving…';

        try {
            const url    = id ? '/api/agents/' + id : '/api/agents';
            const method = id ? 'PUT' : 'POST';
            const res    = await fetch(url, {
                method:  method,
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(body)
            });
            const data = await res.json();
            if (data.error) { showAlert(data.error, 'danger'); return; }
            agentModal.hide();
            showAlert(id ? 'Agent updated.' : 'Agent created.', 'success');
            setTimeout(function () { location.reload(); }, 800);
        } catch (e) {
            showAlert('Network error saving agent.', 'danger');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-save me-1"></i>Save Agent';
        }
    }

    // ── Delete ────────────────────────────────────────────────────────────────
    async function deleteAgent(id) {
        if (!confirm('Delete this agent? This cannot be undone.')) return;
        try {
            const res  = await fetch('/api/agents/' + id, { method: 'DELETE' });
            const data = await res.json();
            if (data.error) { showAlert(data.error, 'danger'); return; }
            showAlert('Agent deleted.', 'success');
            const row = document.getElementById('row-' + id);
            if (row) row.remove();
            allAgents = allAgents.filter(function (a) { return a.uuid !== id; });
        } catch (e) {
            showAlert('Network error deleting agent.', 'danger');
        }
    }

    // ── Alert helper ──────────────────────────────────────────────────────────
    function showAlert(msg, type) {
        const area = document.getElementById('alert-area');
        area.innerHTML =
            '<div class="alert alert-' + type + ' alert-dismissible fade show" role="alert">' +
            escapeHtml(msg) +
            '<button type="button" class="btn-close" data-bs-dismiss="alert"></button>' +
            '</div>';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
</script>
</body>
</html>
