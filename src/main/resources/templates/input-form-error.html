<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/packages/npm/bootstrap/current/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/bootstrap-theme.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .result-card { max-width: 480px; width: 100%; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="card result-card mx-auto shadow text-center">
        <div class="card-body py-5">
            <i class="fa-solid fa-circle-xmark fa-3x text-danger mb-3"></i>
            <h4 class="mb-3">Could Not Process Request</h4>
            <p class="text-muted" th:text="${errorMessage}">An error occurred.</p>
            <p class="text-muted small">Please ask in Telegram if you need help.</p>
        </div>
    </div>
</div>
<link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
</body>
</html>
