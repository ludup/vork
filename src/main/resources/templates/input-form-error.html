<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/vork.css">
</head>
<body class="min-h-screen bg-zinc-950 flex items-center justify-center p-4">
<div class="w-full max-w-sm">
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-10 text-center shadow-2xl">
        <i class="fa-solid fa-circle-xmark text-[#ff6b6b] text-5xl mb-4 block"></i>
        <h4 class="text-lg font-bold text-zinc-100 mb-2">Could Not Process Request</h4>
        <p class="text-zinc-500 text-sm mb-1" th:text="${errorMessage}">An error occurred.</p>
        <p class="text-zinc-600 text-xs">Please ask in Telegram if you need help.</p>
    </div>
</div>
</body>
</html>
