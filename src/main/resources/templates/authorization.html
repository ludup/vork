<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Required — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Custom Vork Theme -->
    <link rel="stylesheet" href="/css/bootstrap-theme.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Authorization stylesheet -->
    <link rel="stylesheet" href="/css/authorization.css">
</head>
<body>

    <div class="authorization-container">
        <div class="authorization-card">
            <div class="authorization-header">
                <div class="header-icon">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <h1>Authorization Required</h1>
                <p class="text-muted">Confirm this action as the currently signed-in user</p>
            </div>

            <div class="action-details" id="actionDetails">
                <!-- Populated by JavaScript -->
            </div>

            <form id="authForm" class="authorization-form">
                <!-- Error message -->
                <div class="alert alert-danger alert-dismissible fade show d-none" id="errorAlert" role="alert">
                    <i class="fa-solid fa-circle-exclamation me-2"></i>
                    <span id="errorMessage"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Hidden authorization token -->
                <input type="hidden" id="authToken" name="token">

                <!-- Action buttons -->
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="fa-solid fa-check-circle me-2"></i>Approve
                    </button>
                    <button type="button" class="btn btn-outline-danger btn-lg" id="denyBtn">
                        <i class="fa-solid fa-times-circle me-2"></i>Deny
                    </button>
                </div>
            </form>

            <!-- Footer -->
            <div class="authorization-footer">
                <p class="text-muted small">
                    <i class="fa-solid fa-info-circle me-1"></i>If your session has expired, you will be asked to log in before you can decide
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Authorization page script -->
    <script src="/js/authorization.js"></script>

</body>
</html>
