<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/vork.css">
    <style>
        @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .auth-card { animation: fadeInUp 0.3s ease-out; }
    </style>
</head>
<body class="min-h-screen bg-zinc-950 flex items-center justify-center p-4"
      style="background: radial-gradient(ellipse at top, rgba(20,20,40,0.9) 0%, #0f0f0f 70%)">

<div class="auth-card w-full max-w-lg">
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl overflow-hidden">

        <!-- Lock icon header -->
        <div class="flex flex-col items-center pt-8 pb-4 px-8 text-center border-b border-zinc-800">
            <div class="w-16 h-16 rounded-full border-2 border-[#fdaa02] bg-[rgba(253,170,2,0.08)]
                        flex items-center justify-center mb-4">
                <i class="fa-solid fa-lock text-[#fdaa02] text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold text-zinc-100 tracking-tight">Authorization Required</h1>
            <p class="text-zinc-500 text-sm mt-1">Review the action below and approve or deny</p>
        </div>

        <div class="p-6">
            <!-- Error alert (hidden by default; shown by authorization.js) -->
            <div id="errorAlert"
                 class="d-none flex items-start gap-2 bg-red-950/50 border border-red-800/60 text-red-400 rounded-lg px-3 py-2.5 mb-4 text-sm">
                <i class="fa-solid fa-circle-exclamation flex-shrink-0 mt-0.5"></i>
                <span id="errorMessage"></span>
            </div>

            <!-- Action details populated by authorization.js -->
            <div id="actionDetails"
                 class="bg-zinc-800/50 border border-zinc-700 rounded-xl p-4 mb-5 text-sm text-zinc-300 leading-relaxed min-h-[60px]">
                <div class="flex items-center gap-2 text-zinc-500">
                    <span class="spinner-border spinner-border-sm"></span>
                    <span>Loading action details&hellip;</span>
                </div>
            </div>

            <!-- Authorization form -->
            <form id="authForm">
                <input type="hidden" id="authToken" value="">

                <div class="flex gap-3">
                    <button type="submit"
                            class="flex-1 bg-[#51cf66] hover:bg-[#3db958] text-black font-semibold rounded-lg
                                   px-4 py-2.5 text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-[#51cf66]/40">
                        <i class="fa-solid fa-check mr-2"></i>Approve
                    </button>
                    <button type="button" id="denyBtn"
                            class="flex-1 bg-zinc-800 hover:bg-red-900/60 border border-zinc-700 hover:border-red-700 text-zinc-300 hover:text-red-400
                                   font-semibold rounded-lg px-4 py-2.5 text-sm transition-colors focus:outline-none">
                        <i class="fa-solid fa-xmark mr-2"></i>Deny
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-4">
        <p class="text-xs text-zinc-700">
            <img src="/images/Vork-Faviconx128.png" alt="" class="inline w-3.5 h-3.5 mr-1 opacity-40">
            Secure Vork Authorization
        </p>
    </div>
</div>

<script src="/packages/npm/bootstrap/current/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/authorization.js"></script>
</body>
</html>
