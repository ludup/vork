<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/vork.css">
</head>
<body class="bg-zinc-950 text-zinc-100">
<div class="max-w-4xl mx-auto px-4 py-8">
    <div th:replace="~{fragments/settings-navigation :: backToHome}"></div>
    <h1 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <i class="fa-solid fa-gear text-[#fdaa02]"></i> Settings
    </h1>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <th:block th:each="page : ${pages}">
            <a th:href="@{/settings/{page}(page=${page.path})}"
               class="block bg-zinc-900 border border-zinc-800 rounded-xl p-6 text-center
                      hover:border-[#fdaa02] hover:shadow-[0_0_20px_rgba(253,170,2,0.12)]
                      transition-all no-underline group">
                <i class="fa-solid text-[#fdaa02] text-2xl mb-3 block" th:classappend="${' ' + page.icon}"></i>
                <h5 class="font-semibold text-zinc-100 mb-1 text-sm" th:text="${page.name}"></h5>
                <p class="text-zinc-500 text-xs leading-relaxed" th:text="${page.description}"></p>
            </a>
        </th:block>
    </div>
</div>
    <script src="/js/settings.js"></script>
</body>
</html>
