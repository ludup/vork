<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/packages/npm/bootstrap/current/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/bootstrap-theme.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>
<body>
<div class="container py-5">
    <div th:replace="~{fragments/settings-navigation :: backToHome}"></div>
    <h1 class="mb-4"><i class="fa-solid fa-gear me-2"></i>Settings</h1>
    <div class="row g-4">
        <th:block th:each="page : ${pages}">
            <div class="col-12 col-md-6 col-lg-4">
                <a th:href="@{/settings/{page}(page=${page.path})}" class="card settings-card h-100 text-decoration-none">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center text-center">
                        <i class="fa-solid" th:classappend="${' ' + page.icon + ' fa-2x mb-3'}"></i>
                        <h5 class="card-title mb-2" th:text="${page.name}"></h5>
                        <p class="card-text text-secondary small" th:text="${page.description}"></p>
                    </div>
                </a>
            </div>
        </th:block>
    </div>
</div>
    <script src="/js/settings.js"></script>
</body>
</html>
