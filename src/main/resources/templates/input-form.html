<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — Vork'">Action Required — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/packages/npm/bootstrap/current/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/bootstrap-theme.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .form-card { max-width: 540px; width: 100%; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="card form-card mx-auto shadow">
        <div class="card-header text-center py-3">
            <i class="fa-brands fa-telegram fa-2x mb-2 d-block text-info"></i>
            <h4 class="mb-0" th:text="${title}">Action Required</h4>
        </div>
        <div class="card-body">
            <p class="text-muted mb-4" th:if="${description != null and !#strings.isEmpty(description)}"
               th:text="${description}"></p>

            <form th:action="@{'/input-form/' + ${sessionUuid} + '/' + ${eventId}}"
                  method="post">
                <input type="hidden" name="token" th:value="${token}">

                <!-- Form fields -->
                <div class="mb-3" th:each="field : ${fields}">
                    <label class="form-label" th:for="${field.name}" th:text="${field.label}"></label>

                    <!-- Password field -->
                    <input th:if="${#strings.equalsIgnoreCase(field.type, 'password')}"
                           th:id="${field.name}"
                           th:name="${field.name}"
                           type="password"
                           class="form-control"
                           th:placeholder="${field.placeholder}"
                           th:required="${field.required}">

                    <!-- Select field -->
                    <select th:if="${#strings.equalsIgnoreCase(field.type, 'select')}"
                            th:id="${field.name}"
                            th:name="${field.name}"
                            class="form-select"
                            th:required="${field.required}">
                        <option th:each="opt : ${field.options}"
                                th:value="${opt.value}"
                                th:text="${opt.label}"></option>
                    </select>

                    <!-- Text / default field -->
                    <input th:unless="${#strings.equalsIgnoreCase(field.type, 'password') or #strings.equalsIgnoreCase(field.type, 'select')}"
                           th:id="${field.name}"
                           th:name="${field.name}"
                           type="text"
                           class="form-control"
                           th:placeholder="${field.placeholder}"
                           th:value="${field.defaultValue}"
                           th:required="${field.required}">
                </div>

                <!-- Action buttons (one submit per action) -->
                <div class="d-grid gap-2 mt-4" th:if="${!#lists.isEmpty(actions)}">
                    <button th:each="action : ${actions}"
                            type="submit"
                            class="btn btn-primary"
                            name="_action"
                            th:value="${action.name}"
                            th:text="${action.label}">Submit</button>
                </div>

                <!-- Fallback single submit if no actions defined -->
                <div class="d-grid mt-4" th:if="${#lists.isEmpty(actions)}">
                    <button type="submit" class="btn btn-primary" name="_action" value="ONCE">
                        Submit
                    </button>
                </div>
            </form>
        </div>
        <div class="card-footer text-center text-muted small">
            This form was sent via Telegram by Vork.
        </div>
    </div>
</div>
<script src="/packages/npm/bootstrap/current/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
