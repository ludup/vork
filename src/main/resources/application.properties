spring.application.name=vork

# Relay base URL for form dispatch (zero-knowledge relay protocol).
# When blank, defaults to https://relay.vork.sh.
# Set to http://localhost:8090 to use a local relay instance during development.
vork.app.base-url=

# Prevent Spring Boot from auto-configuring its own MongoClient;
# Vork's MongoConfig owns the connection lifecycle.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
