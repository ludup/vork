# MongoDB connection
# Vork connects to MongoDB on startup.  Edit these values to point at your
# MongoDB instance before starting the service.
#
# If MongoDB is running on the same machine with default settings, no changes
# are needed — the defaults below work out of the box.
mongo.host=localhost
mongo.port=27017
mongo.database=vork

# Optional authentication — uncomment and fill in if your MongoDB requires credentials
# mongo.username=admin
# mongo.password=secret
